name: Windows build

# Produces the Windows app-image for PC_Server and zips it into one release asset.
# jpackage is NOT a cross-compiler — it only targets the OS it runs on — so this
# runs on a Windows runner. Output: self-contained folder (bundled JDK 21 +
# PCServer.exe + icon.ico), zipped to PCServer-<version>-windows-x64.zip.
#
# Reusable: called by release.yml on a tag, or run manually for a one-off build.

on:
  workflow_dispatch:          # run manually from the Actions tab
  workflow_call:              # invoked by release.yml

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: PC_Server

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: PC_Server/*.gradle

      - name: Build native app-image
        run: .\gradlew.bat jpackageImage --no-daemon

      - name: Zip app-image into one release asset
        shell: pwsh
        run: |
          $ver = (Get-Content ..\VERSION -Raw).Trim()
          Compress-Archive -Path build\jpackage\PCServer `
            -DestinationPath "build\jpackage\PCServer-$ver-windows-x64.zip"

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: PC_Server/build/jpackage/PCServer-*-windows-x64.zip
          if-no-files-found: error
